spring.application.name=fastcash

# ==============================================================
#  CONFIGURACIÓN BASE DE DATOS (RAILWAY)
# ==============================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORRECCIÓN SSL PARA SPRING BOOT 3 (Vía HikariCP)
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.sslfactory=org.postgresql.ssl.NonValidatingFactory

# CORRECCIÓN DEFINITIVA DE HORA (Salto de 5 horas)
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'America/Lima'

# ==============================================================
#  OPTIMIZACIÓN EXTREMA: PLAN GRATUITO RAILWAY (NUEVO)
# ==============================================================
# 1. COMPRESIÓN GZIP (Acelera la red, los JSON pesarán 80% menos)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# 2. LÍMITE DE CONEXIONES HIKARI (Ahorro vital de Memoria RAM)
# Limita las conexiones a 5 (perfecto para 150 tx/día en plan gratis)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000

# 3. PREVENCIÓN DE SATURACIÓN N+1 EN REPORTES (Hibernate Batching)
spring.jpa.properties.hibernate.default_batch_fetch_size=30

# ==============================================================
#  HIBERNATE & JPA
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# FORZAR HORA PERÚ EN HIBERNATE (Para fechas Java)
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# Estrategia de nombres (VITAL para tus tablas con Mayúsculas)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==============================================================
#  SERVIDOR Y ARRANQUE
# ==============================================================
spring.jmx.enabled=false
spring.main.lazy-initialization=false
server.port=${PORT:8080}
